<body class="bg-[#F8FAFC] text-slate-900 h-screen flex flex-col">

    <!-- Modal de Login do ADM -->
    <div id="login-modal" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-[200] hidden flex items-center justify-center">
        <div class="bg-white p-6 rounded-2xl shadow-2xl w-80 flex flex-col gap-4">

    <aside id="options-menu" class="fixed top-0 right-0 h-full w-80 bg-white shadow-2xl flex flex-col border-l border-slate-200">

            <h2 class="font-black text-[10px] uppercase tracking-widest text-slate-900">GERAR PDF</h2>

    <header class="bg-[#E30613] text-white h-11 flex justify-between items-center px-6 shrink-0 z-30 shadow-md">

            </button>
            <div class="relative w-48 text-white">
                <i data-lucide="search" class="absolute left-2.5 top-1/2 -translate-y-1/2 w-3.5 h-3.5 text-white/40"></i>
                <input type="text" id="search-input" placeholder="Pesquisar veículo" class="w-full pl-8 pr-2 py-1 bg-white/10 border border-white/10 rounded-md text-[10px] text-white placeholder:text-white/30 focus:outline-none focus:bg-white/20 transition-all shadow-inner">

    <main class="flex-1 flex overflow-hidden">

        </aside>

        <section id="main-display" class="flex-1 flex flex-col p-4 bg-white overflow-hidden relative">
            <div id="animated-content" class="flex-1 flex flex-col slide-up-active overflow-hidden">
                <div class="header-info-wrapper flex justify-between items-center mb-3 border-b pb-3 border-slate-100 relative z-10 shrink-0">
                    <div class="flex flex-col w-full mr-4">
                        <div class="flex items-center gap-2 text-[#E30613] font-black text-[8px] tracking-[0.3em] mb-1 italic leading-none">
                            <i data-lucide="layers" class="w-3 h-3"></i>
                            <span id="label-title-year">IMAGENS FROTA 2025</span>
                        </div>
                        <div class="flex items-center justify-between w-full">
                            <div class="flex items-center gap-3">
                                <h2 id="current-id" class="text-5xl font-black text-slate-900 tracking-tighter leading-none transition-all">---</h2>
                                <div class="flex flex-col gap-1 ml-2 border-l-2 border-slate-100 pl-3">
                                    <div id="current-unit-label" class="flex items-center gap-1.5 text-slate-500 text-[10px] font-black uppercase tracking-wider leading-none italic">
                                        <i data-lucide="map-pin" class="w-3 h-3 text-[#E30613]"></i> ---
                                    </div>
                                    <div id="notes-container" class="flex flex-wrap gap-1"></div>
                                </div>
                            </div>
                            
                            <div id="adm-fields-container" class="hidden flex-1 max-w-2xl ml-4 bg-slate-100 p-2 rounded-xl flex items-center gap-2">
                                <input type="text" id="edit-transfer" placeholder="Texto Transferência" class="flex-1 p-1.5 text-[10px] font-bold border rounded bg-white">
                                <input type="text" id="edit-notes" placeholder="Observações" class="flex-1 p-1.5 text-[10px] font-bold border rounded bg-white">
                                <button onclick="saveTruckMetadata()" class="bg-green-600 hover:bg-green-700 text-white font-black text-[9px] px-3 py-2 rounded-lg uppercase tracking-wider shadow-sm shrink-0 flex items-center gap-1"><i data-lucide="save" class="w-3 h-3"></i> Salvar</button>
                                <button onclick="deleteTruck()" class="bg-red-600 hover:bg-red-700 text-white font-black text-[9px] px-2.5 py-2 rounded-lg uppercase tracking-wider shadow-sm shrink-0" title="Excluir Veículo"><i data-lucide="trash-2" class="w-3.5 h-3.5"></i></button>
                            </div>
                        </div>
                    </div>
                    <div class="nav-controls-container flex items-center gap-4 bg-slate-50 p-1.5 rounded-xl border border-slate-200 shadow-sm shrink-0">
                        <div class="flex flex-col items-end pr-3 border-r border-slate-200 text-right">
                            <span class="text-[7px] font-black text-slate-300 uppercase block tracking-tighter leading-none mb-0.5">Veículo</span>
                            <span id="page-indicator" class="text-[10px] font-black text-slate-700 tabular-nums leading-none">0 de 0</span>
                        </div>
                        <div class="flex gap-1">
                            <button id="prev-btn" class="p-1.5 rounded-lg hover:bg-white text-slate-400 hover:text-[#E30613] transition-all"><i data-lucide="chevron-left" class="w-5 h-5"></i></button>
                            <button id="next-btn" class="p-1.5 rounded-lg bg-[#E30613] text-white shadow-lg hover:bg-red-700 transition-all"><i data-lucide="chevron-right" class="w-5 h-5"></i></button>
                        </div>
                    </div>
                </div>
                <div id="cycles-grid" class="flex-1 grid grid-cols-3 gap-3 overflow-hidden min-h-0"></div>
            </div>
            <footer class="mt-2 h-5 shrink-0 flex justify-between items-center border-t border-slate-100 pt-1">
                <div id="pagination-dots" class="flex gap-1"></div>
                <span class="text-[10px] font-black text-slate-300 uppercase tracking-[0.4em] italic leading-none">CB Distribuidora de Bebidas</span>
            </footer>
        </section>
    </main>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCq7gTAuPBaY3qdk-Q8oX8hG-t5apsBELE",
            authDomain: "imagens-frota.firebaseapp.com",
            projectId: "imagens-frota",
            storageBucket: "imagens-frota.firebasestorage.app",
            messagingSenderId: "159326049457",
            appId: "1:159326049457:web:4a6161e934f215af347e90",
            measurementId: "G-38FQCRH88B"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        const IMGBB_API_KEY = "8b31673bd19288bca4fcd1093e07d9f1";
        const ALL_UNITS = ["CB NORTE", "CB SUL", "BARREIRAS", "JUAZEIRO", "OT"];

        const cycleInfo = [
            { label: "1º CICLO", range: "Abril - Junho" },
            { label: "2º CICLO", range: "Julho - Setembro" },
            { label: "3º CICLO", range: "Outubro - Dezembro" }
        ];

        let rawFleetDocs = []; 
        let activeUnit = "CB NORTE";
        let activeYear = "2025"; 
        let availableYears = ["2025"];
        let currentIndex = 0;
        let searchTerm = "";
        let isPdfCancelled = false;
        let isAdmin = false;

        // SISTEMA DE NOTIFICAÇÃO TOAST VISUAL
        function showToast(message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            
            const isSuccess = type === 'success';
            const bgColor = isSuccess ? 'bg-slate-900 border-green-500' : 'bg-red-950 border-red-500';
            const iconColor = isSuccess ? 'text-green-400' : 'text-red-400';
            const iconName = isSuccess ? 'check-circle-2' : 'alert-circle';

            toast.className = `toast-animate flex items-center gap-2.5 px-4 py-2.5 rounded-xl border ${bgColor} text-white text-[11px] font-black shadow-2xl pointer-events-auto`;
            toast.innerHTML = `<i data-lucide="${iconName}" class="w-4 h-4 ${iconColor}"></i> <span>${message}</span>`;
            
            container.appendChild(toast);
            lucide.createIcons();

            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateY(-10px)';
                toast.style.transition = 'all 0.3s ease';
                setTimeout(() => toast.remove(), 300);
            }, 2500);
        }

        auth.onAuthStateChanged(user => {
            if (user) {
                isAdmin = true;
                document.getElementById('adm-btn-text').innerText = "Sair (ADM)";
                document.getElementById('adm-fields-container').classList.remove('hidden');
                document.getElementById('btn-add-truck').classList.remove('hidden');
                document.getElementById('btn-add-year').classList.remove('hidden');
            } else {
                isAdmin = false;
                document.getElementById('adm-btn-text').innerText = "Área ADM";
                document.getElementById('adm-fields-container').classList.add('hidden');
                document.getElementById('btn-add-truck').classList.add('hidden');
                document.getElementById('btn-add-year').classList.add('hidden');
            }
            render();
        });

        let unsubscribeFleet = null;
        function loadDataFromFirebase() {
            const yearSelector = document.getElementById('year-selector');
            yearSelector.innerHTML = availableYears.map(y => `<option value="${y}" ${y === activeYear ? 'selected' : ''} class="text-slate-900">${y}</option>`).join('');
            document.getElementById('label-title-year').innerText = `IMAGENS FROTA ${activeYear}`;

            if (unsubscribeFleet) unsubscribeFleet();

            unsubscribeFleet = db.collection("fleet")
                .where("year", "==", activeYear)
                .onSnapshot(snapshot => {
                    rawFleetDocs = [];
                    snapshot.forEach(doc => {
                        const data = doc.data();
                        let cycleUnits = data.cycleUnits;
                        if (!cycleUnits) {
                            const defaultUnit = data.unit || "CB NORTE";
                            cycleUnits = [
                                data.active && data.active[0] ? defaultUnit : null,
                                data.active && data.active[1] ? defaultUnit : null,
                                data.active && data.active[2] ? defaultUnit : null
                            ];
                        }

                        rawFleetDocs.push({
                            id: doc.id.split("_")[1] || doc.id,
                            docId: doc.id,
                            cycleUnits: cycleUnits,
                            active: data.active || [true, true, true],
                            transfer: data.transfer || "",
                            notes: data.notes || "",
                            images: data.images || {}
                        });
                    });
                    render();
                });
        }

        function loadYearsList() {
            db.collection("settings").doc("years").onSnapshot(doc => {
                if (doc.exists && doc.data().list) {
                    availableYears = doc.data().list;
                } else {
                    db.collection("settings").doc("years").set({ list: ["2025"] });
                    availableYears = ["2025"];
                }
                loadDataFromFirebase();
            });
        }

        async function addNewYear() {
            if (!isAdmin) return;
            const newYear = prompt("Digite o novo Ano que deseja gerenciar (Ex: 2026):");
            if (!newYear || availableYears.includes(newYear)) return;

            const baseYear = activeYear; 
            const wantToClone = confirm(`Deseja clonar a lista de veículos de ${baseYear} para o novo ano ${newYear}?`);

            availableYears.push(newYear);
            availableYears.sort((a, b) => parseInt(a) - parseInt(b));
            await db.collection("settings").doc("years").set({ list: availableYears });

            if (wantToClone) {
                try {
                    const snapshot = await db.collection("fleet").where("year", "==", baseYear).get();
                    for (const doc of snapshot.docs) {
                        const originalData = doc.data();
                        const truckId = doc.id.split("_")[1];
                        const newDocId = `${newYear}_${truckId}`;
                        
                        await db.collection("fleet").doc(newDocId).set({
                            year: newYear,
                            cycleUnits: originalData.cycleUnits || [originalData.unit, originalData.unit, originalData.unit],
                            active: originalData.active || [true, true, true],
                            transfer: originalData.transfer || "",
                            notes: originalData.notes || "",
                            images: {}
                        });
                    }
                } catch (err) { showToast("Erro ao clonar dados", "error"); }
            }

            activeYear = newYear;
            currentIndex = 0;
            loadDataFromFirebase();
            showToast(`Ano ${newYear} criado com sucesso!`);
        }

        function changeYear(year) {
            activeYear = year;
            currentIndex = 0;
            loadDataFromFirebase();
        }

        function openLoginModal() {
            if (isAdmin) { auth.signOut(); showToast("Você saiu do modo ADM"); } 
            else { document.getElementById('login-modal').classList.remove('hidden'); }
        }
        function closeLoginModal() { document.getElementById('login-modal').classList.add('hidden'); }
        async function handleLogin() {
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;
            try {
                await auth.signInWithEmailAndPassword(email, password);
                closeLoginModal();
                showToast("Autenticado como ADM!");
            } catch (error) { showToast("Erro de login: " + error.message, "error"); }
        }

        async function addNewTruck() {
            const id = prompt("Digite o número do novo veículo:");
            if (!id) return;
            
            const fullDocId = `${activeYear}_${id}`;
            await db.collection("fleet").doc(fullDocId).set({
                year: activeYear,
                cycleUnits: [activeUnit, activeUnit, activeUnit],
                active: [true, true, true],
                transfer: "",
                notes: "",
                images: {}
            });
            showToast(`Veículo ${id} adicionado!`);
        }

        async function saveTruckMetadata() {
            const list = getCurrentFilteredList();
            const truck = list[currentIndex];
            if (!truck) return;

            await db.collection("fleet").doc(truck.docId).update({
                transfer: document.getElementById('edit-transfer').value,
                notes: document.getElementById('edit-notes').value
            });
            showToast("Informações salvas com sucesso!");
        }

        async function deleteTruck() {
            const list = getCurrentFilteredList();
            const truck = list[currentIndex];
            if (!truck || !isAdmin) return;

            if (confirm(`Atenção: Tem certeza que deseja apagar o veículo ${truck.id} do ano de ${activeYear}?`)) {
                await db.collection("fleet").doc(truck.docId).delete();
                currentIndex = 0;
                render();
                showToast(`Veículo ${truck.id} excluído!`);
            }
        }

        async function setCycleUnit(cycleIdx, newUnit) {
            if (!isAdmin) return;
            const list = getCurrentFilteredList();
            const truck = list[currentIndex];
            if (!truck) return;

            let updatedCycleUnits = [...truck.cycleUnits];
            updatedCycleUnits[cycleIdx] = newUnit;

            await db.collection("fleet").doc(truck.docId).update({
                cycleUnits: updatedCycleUnits
            });
            showToast(`Unidade do ${cycleIdx + 1}º ciclo atualizada!`);
        }

        function triggerImageUpload(cycleIdx, slotIdx) {
            if (!isAdmin) return;
            document.getElementById(`file-input-${cycleIdx}-${slotIdx}`).click();
        }

        // FUNÇÃO DE UPLOAD OTIMIZADA (ELIMINA O ERRO 400 CONVERTENDO PARA BASE64 LIMPO)
        async function uploadFileToSlot(file, cycleIdx, slotIdx, truckDocId) {
            if (!file) return;

            // 1. Validação do tipo de arquivo no navegador
            if (!file.type.startsWith('image/')) {
                showToast("Selecione um arquivo de imagem válido!", "error");
                return;
            }

            const container = document.getElementById(`slot-container-${cycleIdx}-${slotIdx}`);
            const originalHTML = container ? container.innerHTML : ""; 
            if (container) container.innerHTML = `<span class="text-[8px] font-bold text-slate-400 animate-pulse">ENVIANDO...</span>`;

            try {
                // 2. Converte o arquivo para Base64 antes de enviar
                const base64String = await new Promise((resolve, reject) => {
                    const reader = new FileReader();
                 reader.onload = () => {
                        // Remove o cabeçalho 'data:image/jpeg;base64,' mantendo apenas os dados puros da imagem
                        const cleanBase64 = reader.result.split(',')[1];
                        resolve(cleanBase64);
                    };
            reader.onerror = (err) => reject(err);
            reader.readAsDataURL(file);
        });

        // 3. Monta o formulário de envio aceito nativamente pela API
        const formData = new FormData();
        formData.append("image", base64String);

        const response = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, {
            method: "POST",
            body: formData
        });

        const result = await response.json();

        if (result.success) {
            const downloadURL = result.data.url; 
            const imageKey = `images.c${cycleIdx}_s${slotIdx}`;
            
            // Salva o link público gerado no Firestore
            await db.collection("fleet").doc(truckDocId).update({
                [imageKey]: downloadURL
            });
            showToast("Imagem enviada com sucesso!");
        } else { 
            throw new Error(result.error ? result.error.message : "Rejeitado pela API"); 
        }
    } catch (error) {
        console.error("Detalhes do erro de upload:", error);
        showToast("Erro no envio: " + error.message, "error");
        if (container) container.innerHTML = originalHTML;
        render();
    }
}

        async function deleteImage(e, cycleIdx, slotIdx, truckDocId) {
            e.stopPropagation();
            if (!isAdmin) return;

            try {
                const imageKey = `images.c${cycleIdx}_s${slotIdx}`;
                await db.collection("fleet").doc(truckDocId).update({
                    [imageKey]: firebase.firestore.FieldValue.delete()
                });
                showToast("Imagem removida!");
            } catch (err) {
                showToast("Erro ao remover imagem", "error");
            }
        }

        function handleDragOver(e) { e.preventDefault(); if (isAdmin) e.currentTarget.classList.add('drag-over-slot'); }
        function handleDragLeave(e) { e.preventDefault(); e.currentTarget.classList.remove('drag-over-slot'); }
        function handleDrop(e, cycleIdx, slotIdx, truckDocId) {
            e.preventDefault(); e.currentTarget.classList.remove('drag-over-slot');
            if (isAdmin && e.dataTransfer.files && e.dataTransfer.files[0]) {
                uploadFileToSlot(e.dataTransfer.files[0], cycleIdx, slotIdx, truckDocId);
            }
        }

        function handleImgLoad(img) { img.classList.remove('opacity-0'); img.classList.add('opacity-100'); }
        function handleImgError(img) { img.style.display = 'none'; }
        function openZoom(src) { if (!src || isAdmin) return; document.getElementById('lightbox-img').src = src; document.getElementById('lightbox-modal').style.display = 'flex'; }
        function toggleMenu() { const menu = document.getElementById('options-menu'); menu.classList.toggle('open'); if (menu.classList.contains('open')) updatePDFList(); }

        function toggleComparison() {
            document.body.classList.toggle('comparison-active');
            const btn = document.getElementById('btn-comparison');
            btn.innerHTML = document.body.classList.contains('comparison-active')
                ? `<i data-lucide="layout-list" class="w-3.5 h-3.5"></i> Sair Comparação (C)`
                : `<i data-lucide="layout-grid" class="w-3.5 h-3.5"></i> Comparar Ciclos (C)`;
            lucide.createIcons();
        }

        function getCurrentFilteredList() {
            return rawFleetDocs.filter(truck => {
                const matchesSearch = truck.id.includes(searchTerm);
                const hasCycleInUnit = truck.cycleUnits && truck.cycleUnits.includes(activeUnit);
                return matchesSearch && hasCycleInUnit;
            }).sort((a, b) => parseInt(a.id) - parseInt(b.id));
        }

        function updatePDFList() {
            const unit = document.getElementById('pdf-unit-filter').value;
            const container = document.getElementById('pdf-truck-selection');
            let list = [];
            
            if (unit === "TODAS AS UNIDADES") {
                list = [...rawFleetDocs];
            } else {
                list = rawFleetDocs.filter(t => t.cycleUnits && t.cycleUnits.includes(unit));
            }
            
            list.sort((a, b) => parseInt(a.id) - parseInt(b.id));
            container.innerHTML = list.map(t => `
                <label class="flex items-center gap-3 p-2 hover:bg-slate-100 rounded-lg cursor-pointer transition-all">
                    <input type="checkbox" data-unit="${unit}" value="${t.id}" class="pdf-checkbox w-4 h-4 accent-[#E30613] rounded">
                    <div class="flex flex-col">
                        <span class="text-[11px] font-black text-slate-700 tracking-tighter">${t.id}</span>
                        <span class="text-[7px] font-bold text-slate-400 uppercase tracking-tighter">${unit}</span>
                    </div>
                </label>`).join('');
        }

        function render(isUnitJump = false) {
            const list = getCurrentFilteredList();
            const truck = list[currentIndex] || list[0] || { id: "---", docId:"", cycleUnits: [null, null, null], transfer:"", notes:"", images:{} };
            
            if (isAdmin && list.length > 0) {
                document.getElementById('edit-transfer').value = truck.transfer || "";
                document.getElementById('edit-notes').value = truck.notes || "";
            }

            const animatedContent = document.getElementById('animated-content');
            if(animatedContent) {
                animatedContent.classList.remove('slide-up-active'); void animatedContent.offsetWidth; animatedContent.classList.add('slide-up-active');
            }
            
            const display = document.getElementById('main-display');
            if (isUnitJump) { display.classList.add('unit-jump-glow'); setTimeout(() => display.classList.remove('unit-jump-glow'), 1500); }
            
            document.getElementById('unit-selector').innerHTML = ALL_UNITS.map(name => `<button onclick="changeUnit('${name}')" class="px-3 py-1.5 rounded-md transition-all ${activeUnit === name ? 'bg-white text-[#E30613] shadow-md scale-105' : 'text-white/60 hover:text-white'}">${name}</button>`).join('');
            document.getElementById('total-counter').innerText = `${list.length} veículos`;
            
            const truckList = document.getElementById('truck-list');
            truckList.innerHTML = list.map((t, i) => `<button onclick="setStep(${i})" class="w-full group flex flex-col items-center p-2.5 rounded-xl transition-all duration-200 ${truck.id === t.id ? 'bg-[#E30613] text-white shadow-lg scale-105' : 'hover:bg-white text-slate-400'}"><span class="text-[11px] font-black">${t.id}</span></button>`).join('');
            
            document.getElementById('current-id').innerText = truck.id;
            document.getElementById('current-unit-label').innerText = activeUnit;
            document.getElementById('page-indicator').innerText = `${list.length > 0 ? currentIndex + 1 : 0} de ${list.length}`;
            
            const notesContainer = document.getElementById('notes-container');
            notesContainer.innerHTML = '';
            if (truck.transfer) notesContainer.innerHTML += `<div class="bg-red-600 text-white px-4 py-0.5 rounded shadow-sm text-[10px] font-black uppercase"><i data-lucide="arrow-right-left" class="w-2.5 h-2.5 inline mr-1"></i>${truck.transfer}</div>`;
            if (truck.notes) notesContainer.innerHTML += `<div class="bg-slate-900 text-white px-4 py-0.5 rounded text-[10px] font-black uppercase"><i data-lucide="wrench" class="w-2.5 h-2.5 inline mr-1 text-[#E30613]"></i>${truck.notes}</div>`;
            
            document.getElementById('cycles-grid').innerHTML = [0, 1, 2].map(i => {
                const assignedUnit = truck.cycleUnits ? truck.cycleUnits[i] : null;
                const isActiveInThisUnit = (assignedUnit === activeUnit);
                const imgs = truck.images || {};
                
                return `
                    <div class="flex flex-col rounded-3xl border-2 transition-all duration-500 overflow-hidden ${isActiveInThisUnit ? 'bg-white border-slate-100 shadow-xl' : 'bg-slate-50 border-dashed border-slate-200 opacity-30 grayscale'}">
                        <div class="px-4 py-2 border-b flex justify-between items-center ${isActiveInThisUnit ? 'bg-[#E30613]/5' : 'bg-slate-100'}">
                            <div>
                                <span class="text-[9px] font-black text-slate-800 uppercase tracking-widest">${cycleInfo[i].label}</span>
                                <span class="text-[7px] font-bold text-slate-400 block italic">${cycleInfo[i].range}</span>
                            </div>
                            
                            ${isAdmin ? `
                                <select onchange="setCycleUnit(${i}, this.value)" class="text-[8px] font-bold border rounded px-1 py-0.5 bg-white text-slate-800 outline-none">
                                    <option value="">(Nenhuma)</option>
                                    ${ALL_UNITS.map(u => `<option value="${u}" ${u === assignedUnit ? 'selected' : ''}>${u}</option>`).join('')}
                                </select>
                            ` : `
                                ${isActiveInThisUnit ? '<i data-lucide="check-circle-2" class="w-3 h-3 text-green-500"></i>' : `<span class="text-[7px] font-extrabold text-slate-400 uppercase italic">${assignedUnit ? 'EM ' + assignedUnit : 'INATIVO'}</span>`}
                            `}
                        </div>
                        <div class="flex-1 p-2 grid grid-cols-2 grid-rows-2 gap-2 overflow-hidden">
                            ${[1, 2, 3, 4].map(s => {
                                const imgUrl = imgs[`c${i}_s${s}`] || "";
                                const canUpload = isAdmin && isActiveInThisUnit;
                                return `
                                    <div id="slot-container-${i}-${s}" 
                                         ${canUpload ? `onclick="triggerImageUpload(${i}, ${s})"` : ''} 
                                         ondragover="handleDragOver(event)" 
                                         ondragleave="handleDragLeave(event)" 
                                         ondrop="handleDrop(event, ${i}, ${s}, '${truck.docId}')"
                                         class="image-slot bg-slate-100/80 rounded-2xl border relative group overflow-hidden ${canUpload ? 'border-blue-300 hover:bg-blue-50 cursor-pointer' : ''} flex items-center justify-center shadow-sm">
                                        
                                        ${imgUrl ? `<img src="${imgUrl}" onload="handleImgLoad(this)" onerror="handleImgError(this)" onclick="openZoom('${imgUrl}')" class="opacity-0 max-w-full max-h-full object-contain z-10" alt="Foto da frota">` : ''}
                                        
                                        <i data-lucide="${canUpload ? 'upload-cloud' : 'image'}" class="img-placeholder-icon absolute w-5 h-5 ${canUpload ? 'text-blue-400' : 'text-slate-200'} z-0"></i>
                                        
                                        ${isAdmin && imgUrl ? `<button onclick="deleteImage(event, ${i}, ${s}, '${truck.docId}')" title="Excluir imagem" class="absolute top-1.5 right-1.5 bg-red-600/90 hover:bg-red-700 text-white p-1 rounded-full z-30 transition-all shadow-md"><i data-lucide="trash-2" class="w-3 h-3"></i></button>` : ''}
                                        
                                        ${canUpload ? `<input type="file" id="file-input-${i}-${s}" accept="image/jpeg" class="hidden" onchange="handleFileUpload(this, ${i}, ${s}, '${truck.docId}')">` : ''}
                                    </div>`;
                            }).join('')}
                        </div>
                    </div>`;
            }).join('');
            
            document.getElementById('pagination-dots').innerHTML = list.map((_, i) => `<div class="h-1 rounded-full ${currentIndex === i ? 'w-4 bg-[#E30613]' : 'w-1 bg-slate-200'}"></div>`).join('');
            lucide.createIcons();
        }

        function changeUnit(unit) { activeUnit = unit; currentIndex = 0; render(true); }
        function setStep(i) { currentIndex = i; render(); }

        document.getElementById('prev-btn').onclick = () => { 
            if (currentIndex > 0) { currentIndex--; render(); } 
        };
        
        document.getElementById('next-btn').onclick = () => { 
            const list = getCurrentFilteredList(); 
            if (currentIndex < list.length - 1) { currentIndex++; render(); } 
        };
        
        document.getElementById('search-input').oninput = (e) => {
            const val = e.target.value.trim(); searchTerm = val; currentIndex = 0;
            if (val.length >= 2) { 
                for (const u of ALL_UNITS) { 
                    const idx = rawFleetDocs.filter(t => t.id.includes(val) && t.cycleUnits && t.cycleUnits.includes(u))
                        .sort((a, b) => parseInt(a.id) - parseInt(b.id))
                        .findIndex(t => t.id === val);
                    if (idx !== -1) { activeUnit = u; currentIndex = idx; render(); return; } 
                } 
            }
            render();
        };

        window.addEventListener('keydown', (e) => {
            if (document.activeElement.tagName === 'INPUT' || document.activeElement.tagName === 'TEXTAREA') return;

            if (e.key === 'Escape') {
                if (document.body.classList.contains('comparison-active')) { toggleComparison(); return; }
                document.getElementById('lightbox-modal').style.display = 'none';
            }
            else if (e.key.toLowerCase() === 'c') { toggleComparison(); }
            else if (e.key === 'ArrowRight') { document.getElementById('next-btn').click(); }
            else if (e.key === 'ArrowLeft') { document.getElementById('prev-btn').click(); }
        });

        function toggleFullscreen() { if (!document.fullscreenElement) document.documentElement.requestFullscreen(); else document.exitFullscreen(); }
        window.onload = loadYearsList;
    </script>
